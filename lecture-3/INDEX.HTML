<html>
  <head>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky src="./FOREST.jpg"></a-sky>
      <a-plane
        src="./GRASS1.jpg"
        rotation="-90 0 0"
        width="20"
        height="20"
      ></a-plane>
      <a-entity position="0 0 -3">
        <a-cylinder color="brown" height="2" radius="0.2"></a-cylinder>
        <a-sphere color="green" position="0 1.5 0" radius="1">
          <a-animation
            attribute="rotation"
            to="0 360 0"
            dur="4000"
            repeat="indefinite"
          ></a-animation>
        </a-sphere>
      </a-entity>
    </a-scene>
  </body>
</html>
